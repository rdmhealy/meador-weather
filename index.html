<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meador Weather</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --g:#FF8C00;--gd:#cc6f00;--gl:#FFF3E0;--gm:#FFE0B2;
  --oe:#FF8C00;--text:#3D2000;--muted:#A0622A;--faint:#C8844A;
  --rain:#3A7BD5;--border:rgba(255,140,0,0.18);--shadow:rgba(255,140,0,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#f0faf5;color:var(--text);min-height:100vh}

/* TICKER */
.tw{background:#0a3320;overflow:hidden;height:38px;display:flex;align-items:center}
.tb{font-size:11px;font-weight:900;letter-spacing:.08em;padding:0 12px;height:100%;display:flex;align-items:center;white-space:nowrap;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.1);color:white}
.tb-ie{background:#169B62}.tb-us{background:#bf0a30}
.ti-wrap{overflow:hidden;flex:1;height:100%}
.tt{display:flex;animation:scroll 80s linear infinite;white-space:nowrap;height:100%;align-items:center}
.tw:hover .tt{animation-play-state:paused}
.ti{display:inline-flex;align-items:center;gap:7px;padding:0 18px;height:100%;border-right:1px solid rgba(255,255,255,0.07);font-size:12px;font-weight:700;color:white;flex-shrink:0}
.ti-g{font-size:10px;color:#4ade80;font-weight:900}
.ti-m{font-size:10px;color:#fbbf24;font-weight:900}
.ti-n{font-size:10px;color:#60a5fa;font-weight:900}
.ti-sc{font-size:13px;font-weight:900}
.ti-live{color:#ff6b6b;font-size:10px;font-weight:900;animation:blink 1s infinite}
.ti-dim{color:rgba(255,255,255,.4)}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}

/* HEADER */
.hdr{background:var(--g);padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;box-shadow:0 4px 20px rgba(22,155,98,.4);position:sticky;top:38px;z-index:100;border-bottom:4px solid var(--oe)}
.logo{font-family:'Pacifico',cursive;font-size:23px;color:white;padding:12px 0;text-shadow:2px 2px 0 rgba(0,0,0,.2);white-space:nowrap}
.hdr-r{display:flex;align-items:center;gap:10px}
.tgl{background:rgba(255,255,255,.2);border-radius:30px;padding:4px;display:flex}
.tgl button{border:none;background:transparent;color:rgba(255,255,255,.85);font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;padding:5px 14px;border-radius:24px;cursor:pointer;transition:all .2s}
.tgl button.on{background:white;color:var(--gd)}
.ldot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pdot 2s infinite;flex-shrink:0}
.llbl{font-size:11px;color:rgba(255,255,255,.8);font-weight:700}
@keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* TABS */
.tabs{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:12px 20px;background:var(--gl);border-bottom:2px solid var(--border)}
.tabs::-webkit-scrollbar{display:none}
.tab{border:2px solid transparent;background:white;border-radius:30px;padding:8px 16px;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .2s;box-shadow:0 2px 8px var(--shadow)}
.tab:hover{border-color:var(--g);color:var(--gd)}
.tab.on{background:var(--g);color:white;border-color:var(--gd);box-shadow:0 4px 14px rgba(22,155,98,.35)}

.main{padding:20px;max-width:1100px;margin:0 auto}

/* HERO */
.hero{background:var(--g);border-radius:28px;padding:30px;color:white;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px;margin-bottom:18px;box-shadow:0 8px 32px rgba(22,155,98,.35);position:relative;overflow:hidden;animation:up .35s ease;border-bottom:6px solid var(--oe)}
.hero::before{content:'';position:absolute;right:-50px;top:-50px;width:240px;height:240px;background:rgba(255,255,255,.1);border-radius:50%}
.hero::after{content:'';position:absolute;right:80px;bottom:-70px;width:180px;height:180px;background:rgba(255,255,255,.07);border-radius:50%}
.h-city{font-size:14px;font-weight:700;opacity:.85;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.h-temp{font-family:'Pacifico',cursive;font-size:86px;line-height:1}
.h-feels{font-size:14px;opacity:.85;margin-top:4px;font-weight:600}
.h-desc{font-size:20px;font-weight:800;margin-top:6px}
.h-icon{font-size:86px;line-height:1;position:relative;z-index:1}
.h-upd{font-size:11px;opacity:.7;margin-top:8px;font-weight:600;text-align:right;position:relative;z-index:1}

/* PILLS */
.pills{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;animation:up .35s ease .05s both}
.pill{background:white;border-radius:20px;padding:10px 16px;display:flex;align-items:center;gap:8px;box-shadow:0 2px 10px var(--shadow);border:2px solid var(--border)}
.pi{font-size:18px}.pl{color:var(--faint);font-weight:600;font-size:11px;display:block}.pv{font-size:15px;font-weight:800;color:var(--text)}

/* GRID */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;animation:up .35s ease .1s both}
@media(max-width:660px){.grid{grid-template-columns:1fr}}
.wide{grid-column:1/-1}
.card{background:white;border-radius:20px;padding:20px;box-shadow:0 2px 14px var(--shadow);border:2px solid var(--border)}
.ct{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:14px}

/* HOURLY */
.hscroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.hscroll::-webkit-scrollbar{display:none}
.hitem{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:50px;background:var(--gl);border-radius:14px;padding:10px 6px}
.ht{font-size:11px;font-weight:700;color:var(--faint)}.hi{font-size:20px}.htp{font-size:14px;font-weight:800;color:var(--text)}.hr{font-size:10px;font-weight:700;color:var(--rain)}

/* 5-DAY */
.drow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);gap:8px}
.drow:last-child{border-bottom:none}
.dn{font-weight:800;font-size:13px;width:40px;flex-shrink:0}.dic{font-size:20px}
.dd{font-size:12px;color:var(--muted);font-weight:600;flex:1;text-align:center}
.drp{font-size:11px;color:var(--rain);font-weight:700;width:38px;text-align:right;flex-shrink:0}
.dts{display:flex;gap:6px;align-items:baseline;flex-shrink:0}
.dhi{font-weight:800;font-size:14px;color:var(--text)}.dlo{font-weight:600;font-size:13px;color:var(--faint)}

/* UV */
.uvbw{background:var(--gl);border-radius:8px;height:10px;margin:10px 0 6px;overflow:hidden}
.uvb{height:10px;border-radius:8px}
.uvlabs{display:flex;justify-content:space-between;font-size:11px;font-weight:700}
.suntimes{display:flex;justify-content:space-around;margin-top:14px}
.si{text-align:center}.siicon{font-size:28px}.sitime{font-size:15px;font-weight:800;color:var(--text)}.silbl{font-size:11px;color:var(--muted);font-weight:600}

/* AQI */
.aqibig{font-size:52px;font-family:'Pacifico',cursive;margin:4px 0;line-height:1}
.aqiscale{display:flex;gap:3px;margin-top:10px}.aqiseg{height:8px;border-radius:4px;flex:1}

/* PRECIP */
.pbars{display:flex;align-items:flex-end;gap:8px;margin-top:8px}
.pcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.pbw{width:100%;background:var(--gl);border-radius:6px 6px 0 0;flex:1;display:flex;align-items:flex-end;overflow:hidden}
.pb{width:100%;background:var(--rain);border-radius:4px 4px 0 0}
.plbl{font-size:10px;font-weight:700;color:var(--faint)}.pamt{font-size:10px;font-weight:800;color:var(--rain);min-height:15px}

/* SCORES */
.stabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.stab{border:2px solid var(--border);background:white;border-radius:20px;padding:6px 14px;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;color:var(--muted);cursor:pointer;transition:all .2s}
.stab.on{background:#0a3320;color:white;border-color:#0a3320}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.sc{background:white;border-radius:16px;padding:14px 16px;border:2px solid var(--border);box-shadow:0 2px 10px var(--shadow)}
.sc-hd{font-size:10px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.sc-live{color:#ef4444;font-size:10px;font-weight:900;animation:blink 1s infinite}
.sc-final{color:var(--muted);font-size:10px;font-weight:700}
.sc-sched{color:var(--rain);font-size:10px;font-weight:700}
.sc-row{display:flex;align-items:center;justify-content:space-between;padding:3px 0}
.sc-team{font-size:13px;font-weight:800;color:var(--text)}
.sc-num{font-size:17px;font-weight:900;font-family:'Pacifico',cursive}
.win{color:var(--gd)}

/* REFRESH BTN */
.rbtn{background:var(--g);color:white;border:none;border-radius:20px;padding:9px 20px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .2s;box-shadow:0 4px 12px rgba(22,155,98,.3)}
.rbtn:hover{background:var(--gd);transform:translateY(-1px)}
.rbtn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.rbtn-spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite}
.supd{font-size:11px;color:var(--faint);font-weight:600;margin-top:4px}

/* RAIN-OUT */
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.ro{background:white;border-radius:20px;padding:16px;border:2px solid var(--border);box-shadow:0 2px 14px var(--shadow);position:relative;overflow:hidden}
.ro::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:20px 20px 0 0}
.ro-great::before{background:#22c55e}.ro-ok::before{background:#eab308}
.ro-risky::before{background:#f97316}.ro-bad::before{background:#ef4444}
.ro-teams{font-size:13px;font-weight:800;color:var(--text);margin-bottom:2px}
.ro-stad{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:10px}
.ro-v{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ro-em{font-size:34px;line-height:1}
.ro-lbl{font-size:14px;font-weight:900}
.ro-great .ro-lbl{color:#16a34a}.ro-ok .ro-lbl{color:#ca8a04}
.ro-risky .ro-lbl{color:#ea580c}.ro-bad .ro-lbl{color:#dc2626}
.ro-sub{font-size:11px;color:var(--muted);font-weight:600}
.ro-stats{display:flex;gap:6px;flex-wrap:wrap}
.ro-stat{background:var(--gl);border-radius:10px;padding:4px 10px;font-size:11px;font-weight:800;color:var(--text)}
.ro-lb{font-size:10px;font-weight:900;padding:3px 8px;border-radius:10px;margin-bottom:6px;display:inline-block}
.ro-live-lb{background:#fee2e2;color:#dc2626}.ro-sched-lb{background:#dbeafe;color:#1d4ed8}
.mspin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.rld{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px;font-weight:700;padding:8px 0}

.nxt{text-align:center;font-size:11px;color:var(--faint);font-weight:700;margin-top:10px;padding:8px;background:white;border-radius:10px;border:1px solid var(--border)}
.loader{text-align:center;padding:60px 20px;color:var(--muted)}
.spin-lg{display:inline-block;width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="tw">
  <div class="tb tb-ie">⚾🏈 SCORES</div>
  
  <div class="ti-wrap">
    <div class="tt" id="ticker"><div class="ti ti-dim">Loading scores...</div></div>
  </div>
</div>

<div class="hdr">
  <div class="logo">☀️ Meador Weather 🌤️</div>
  <div class="hdr-r">
    <div class="ldot"></div><div class="llbl" id="rlbl">Live</div>
    <div class="tgl">
      <button id="bf" class="on" onclick="setUnit('F')">°F</button>
      <button id="bc" onclick="setUnit('C')">°C</button>
    </div>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div class="main">
  <div id="content">
    <div class="loader"><div class="spin-lg"></div><div style="font-weight:800;font-size:16px;color:var(--text)">Loading weather...</div></div>
  </div>

  <!-- RAIN-OUT -->
  <div class="card wide" style="margin-top:16px;animation:up .35s ease .18s both">
    <div class="ct" style="margin-bottom:6px">⚾ Will today's game be rained out?</div>
    <div style="font-size:12px;color:var(--muted);font-weight:600;margin-bottom:16px">Live stadium weather for every MLB game today 🧢</div>
    <div class="rgrid" id="rgrid"><div style="color:var(--muted);font-size:13px;font-weight:700">Checking stadiums...</div></div>
  </div>

  <!-- LIVE SCORES via ESPN API -->
  <div class="card wide" style="margin-top:16px;animation:up .35s ease .22s both">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:12px">
      <div>
        <div class="ct" style="margin-bottom:2px">🏟️ Live sports scores</div>
        <div class="supd" id="supd">Loading via ESPN...</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <div class="stabs">
          
          <button class="stab on" onclick="switchTab('mlb')">⚾ MLB</button>
          <button class="stab" onclick="switchTab('nfl')">🏈 NFL</button>
        </div>
        <button class="rbtn" id="rbtn" onclick="loadScores()">↺ Refresh scores</button>
      </div>
    </div>
    <div id="scores-panel">
      <div style="text-align:center;padding:20px;color:var(--faint);font-size:13px;font-weight:700">Loading scores from ESPN...</div>
    </div>
  </div>

  <div class="nxt" id="nxt">Weather auto-refreshes every 10 minutes</div>
</div>

<script>
/* ── CONFIG ── */
const CITIES=[
  {id:'ireland',   name:'Ireland',    flag:'🇮🇪',lat:53.3498, lon:-6.2603,  tz:'Europe/Dublin'},
  {id:'maryland',  name:'Maryland',   flag:'🇺🇸',lat:39.0458, lon:-76.6413, tz:'America/New_York'},
  {id:'sunnyvale', name:'Sunnyvale',  flag:'🇺🇸',lat:37.3688, lon:-122.0363,tz:'America/Los_Angeles'},
  {id:'menlopark', name:'Menlo Park', flag:'🇺🇸',lat:37.4530, lon:-122.1817,tz:'America/Los_Angeles'},
  {id:'asheville', name:'Asheville',  flag:'🇺🇸',lat:35.5951, lon:-82.5515, tz:'America/New_York'},
  {id:'la',        name:'Los Angeles',flag:'🇺🇸',lat:34.0522, lon:-118.2437,tz:'America/Los_Angeles'},
  {id:'madrid',    name:'Madrid',     flag:'🇪🇸',lat:40.4168, lon:-3.7038,  tz:'Europe/Madrid'},
];

/* ── STADIUMS ── */
const ST={
  WSH:{n:'Nationals Park',      c:'Washington DC',    lat:38.873,lon:-77.007,tz:'America/New_York'},
  ATL:{n:'Truist Park',         c:'Atlanta',          lat:33.890,lon:-84.467,tz:'America/New_York'},
  DET:{n:'Comerica Park',       c:'Detroit',          lat:42.339,lon:-83.048,tz:'America/Detroit'},
  MIL:{n:'American Family Field',c:'Milwaukee',       lat:43.028,lon:-87.971,tz:'America/Chicago'},
  CHC:{n:'Wrigley Field',       c:'Chicago',          lat:41.948,lon:-87.655,tz:'America/Chicago'},
  PHI:{n:'Citizens Bank Park',  c:'Philadelphia',     lat:39.906,lon:-75.166,tz:'America/New_York'},
  COL:{n:'Coors Field',         c:'Denver',           lat:39.755,lon:-104.994,tz:'America/Denver'},
  SD: {n:'Petco Park',          c:'San Diego',        lat:32.707,lon:-117.156,tz:'America/Los_Angeles'},
  AZ: {n:'Chase Field',         c:'Phoenix',          lat:33.445,lon:-112.066,tz:'America/Phoenix'},
  CWS:{n:'Guaranteed Rate Field',c:'Chicago',         lat:41.830,lon:-87.633,tz:'America/Chicago'},
  SF: {n:'Oracle Park',         c:'San Francisco',    lat:37.778,lon:-122.389,tz:'America/Los_Angeles'},
  LAD:{n:'Dodger Stadium',      c:'Los Angeles',      lat:34.073,lon:-118.240,tz:'America/Los_Angeles'},
  BOS:{n:'Fenway Park',         c:'Boston',           lat:42.346,lon:-71.097,tz:'America/New_York'},
  NYY:{n:'Yankee Stadium',      c:'New York',         lat:40.829,lon:-73.926,tz:'America/New_York'},
  NYM:{n:'Citi Field',          c:'New York',         lat:40.757,lon:-73.845,tz:'America/New_York'},
  MIN:{n:'Target Field',        c:'Minneapolis',      lat:44.981,lon:-93.277,tz:'America/Chicago'},
  TEX:{n:'Globe Life Field',    c:'Arlington TX',     lat:32.747,lon:-97.082,tz:'America/Chicago'},
  PIT:{n:'PNC Park',            c:'Pittsburgh',       lat:40.446,lon:-80.005,tz:'America/New_York'},
  CLE:{n:'Progressive Field',   c:'Cleveland',        lat:41.496,lon:-81.685,tz:'America/New_York'},
  HOU:{n:'Minute Maid Park',    c:'Houston',          lat:29.757,lon:-95.355,tz:'America/Chicago'},
  TB: {n:'Tropicana Field',     c:'St. Petersburg',   lat:27.768,lon:-82.653,tz:'America/New_York'},
  CIN:{n:'Great American Ball Park',c:'Cincinnati',   lat:39.097,lon:-84.508,tz:'America/New_York'},
  BAL:{n:'Camden Yards',        c:'Baltimore',        lat:39.283,lon:-76.621,tz:'America/New_York'},
  KC: {n:'Kauffman Stadium',    c:'Kansas City',      lat:39.051,lon:-94.480,tz:'America/Chicago'},
  STL:{n:'Busch Stadium',       c:'St. Louis',        lat:38.622,lon:-90.192,tz:'America/Chicago'},
  MIA:{n:'loanDepot park',      c:'Miami',            lat:25.778,lon:-80.219,tz:'America/New_York'},
  SEA:{n:'T-Mobile Park',       c:'Seattle',          lat:47.591,lon:-122.332,tz:'America/Los_Angeles'},
  LAA:{n:'Angel Stadium',       c:'Anaheim',          lat:33.800,lon:-117.882,tz:'America/Los_Angeles'},
  TOR:{n:'Rogers Centre',       c:'Toronto',          lat:43.641,lon:-79.389,tz:'America/Toronto'},
  ATH:{n:'Sutter Health Park',  c:'Sacramento',       lat:38.580,lon:-121.500,tz:'America/Los_Angeles'},
};


const ICO={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌦️',63:'🌧️',65:'🌧️',71:'🌨️',73:'❄️',75:'❄️',77:'❄️',80:'🌦️',81:'🌧️',82:'🌧️',85:'❄️',86:'❄️',95:'⛈️',96:'⛈️',99:'⛈️'};
const TXT={0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',77:'Snow grains',80:'Light showers',81:'Showers',82:'Heavy showers',85:'Snow showers',86:'Heavy snow showers',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm'};
const AQI_L=['Good','Fair','Moderate','Poor','Very Poor'];
const AQI_C=['#4CAF50','#CDDC39','#FF9800','#F44336','#9C27B0'];
const DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let unit='F',city=CITIES[0],wxCache={},secondsLeft=600;
let curTab='mlb',mlbGames=[],nflGames=[],rainoutGames=[];

const toF=c=>Math.round(c*9/5+32);
const D=c=>unit==='F'?toF(c)+'°F':Math.round(c)+'°C';
const N=c=>unit==='F'?toF(c):Math.round(c);
const tStr=c=>unit==='F'?toF(c)+'°F':Math.round(c)+'°C';
function uvC(v){return v<=2?'#4CAF50':v<=5?'#CDDC39':v<=7?'#FF9800':v<=10?'#F44336':'#9C27B0'}
function uvL(v){return v<=2?'Low':v<=5?'Moderate':v<=7?'High':v<=10?'Very High':'Extreme'}
function setUnit(u){unit=u;document.getElementById('bf').classList.toggle('on',u==='F');document.getElementById('bc').classList.toggle('on',u==='C');render();}

/* ── ESPN API ── */
async function fetchESPN(sport,league){
  const url=`https://site.api.espn.com/apis/site/v2/sports/${sport}/${league}/scoreboard`;
  const r=await fetch(url);
  if(!r.ok)throw new Error(`ESPN ${league}: ${r.status}`);
  return r.json();
}

function parseESPN(data){
  const games=[];
  for(const ev of (data.events||[])){
    const comp=ev.competitions?.[0];
    if(!comp)continue;
    const home=comp.competitors?.find(c=>c.homeAway==='home');
    const away=comp.competitors?.find(c=>c.homeAway==='away');
    if(!home||!away)continue;
    const status=comp.status?.type?.name||'';
    const isLive=status==='STATUS_IN_PROGRESS';
    const isFinal=status==='STATUS_FINAL';
    const isSched=!isLive&&!isFinal;
    const homeScore=parseInt(home.score)||0;
    const awayScore=parseInt(away.score)||0;
    games.push({
      home:home.team?.abbreviation||home.team?.name,
      away:away.team?.abbreviation||away.team?.name,
      homeName:home.team?.shortDisplayName||home.team?.name,
      awayName:away.team?.shortDisplayName||away.team?.name,
      homeScore,awayScore,
      isLive,isFinal,isSched,
      statusText:comp.status?.type?.shortDetail||'',
      period:comp.status?.period,
    });
  }
  return games;
}

async function loadScores(){
  const btn=document.getElementById('rbtn');
  btn.disabled=true;
  btn.innerHTML='<div class="rbtn-spin"></div> Loading...';
  document.getElementById('supd').textContent='Fetching from ESPN...';

  try{
    const [mlbData,nflData]=await Promise.allSettled([
      fetchESPN('baseball','mlb'),
      fetchESPN('football','nfl'),
    ]);
    if(mlbData.status==='fulfilled') mlbGames=parseESPN(mlbData.value);
    if(nflData.status==='fulfilled') nflGames=parseESPN(nflData.value);

    // Use MLB live/today games for rain-out
    rainoutGames=mlbGames.slice(0,10);
    buildRainout();
    buildTicker();
    renderScores();

    const n=new Date();
    document.getElementById('supd').textContent=`Updated ${n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} via ESPN · live data`;
  }catch(e){
    document.getElementById('supd').textContent='ESPN fetch failed — '+e.message;
  }finally{
    btn.disabled=false;
    btn.innerHTML='↺ Refresh scores';
  }
}

/* ── RENDER SCORES ── */
function switchTab(tab){
  curTab=tab;
  document.querySelectorAll('.stab').forEach(b=>{
    b.classList.toggle('on',
      
      (tab==='mlb'&&b.textContent.includes('MLB'))||
      (tab==='nfl'&&b.textContent.includes('NFL'))
    );
  });
  renderScores();
}

function renderScores(){
  const panel=document.getElementById('scores-panel');

  const games=curTab==='mlb'?mlbGames:nflGames;
  if(!games.length){
    panel.innerHTML='<div style="text-align:center;padding:20px;color:var(--faint);font-size:13px;font-weight:700">Click Refresh Scores to load live data</div>';
    return;
  }
  panel.innerHTML=`<div class="sgrid">${games.map(g=>{
    const aw=g.awayScore>g.homeScore,hw=g.homeScore>g.awayScore;
    const sport=curTab==='nfl'?'🏈 NFL':'⚾ MLB';
    return `<div class="sc">
      <div class="sc-hd">${sport}${g.isLive?'<span class="sc-live">● LIVE</span>':g.isFinal?`<span class="sc-final">Final</span>`:`<span class="sc-sched">🕐 Soon</span>`}</div>
      <div class="sc-row"><div class="sc-team ${aw?'win':''}">${g.awayName}</div>${!g.isSched?`<div class="sc-num ${aw?'win':''}">${g.awayScore}</div>`:''}</div>
      <div class="sc-row"><div class="sc-team ${hw?'win':''}">${g.homeName}</div>${!g.isSched?`<div class="sc-num ${hw?'win':''}">${g.homeScore}</div>`:''}</div>
      ${g.isLive&&g.statusText?`<div style="font-size:10px;color:var(--faint);font-weight:700;margin-top:6px;text-align:center">${g.statusText}</div>`:''}
    </div>`;
  }).join('')}</div>`;
}

/* ── TICKER ── */
function buildTicker(){
  const gaa=[];
  const mlb=mlbGames.filter(g=>!g.isSched).slice(0,8).map(g=>`<div class="ti">${g.isLive?'<span class="ti-live">●</span>':''}<span class="ti-m">⚾ MLB</span><span>${g.awayName}</span><span class="ti-sc">${g.awayScore}</span><span class="ti-dim">–</span><span class="ti-sc">${g.homeScore}</span><span>${g.homeName}</span></div>`);
  const nfl=nflGames.filter(g=>!g.isSched).slice(0,4).map(g=>`<div class="ti"><span class="ti-n">🏈 NFL</span><span>${g.awayName}</span><span class="ti-sc">${g.awayScore}</span><span class="ti-dim">–</span><span class="ti-sc">${g.homeScore}</span><span>${g.homeName}</span></div>`);
  const all=[...mlb,...nfl,...mlb,...nfl];
  if(all.length) document.getElementById('ticker').innerHTML=all.join('');
}

/* ── RAIN-OUT ── */
function rainV(rain,code){
  if([95,96,99].includes(code))return{cls:'ro-bad',em:'⛈️',lbl:'Game likely cancelled!',sub:'Thunder & lightning — stay safe!'};
  if([61,63,65,80,81,82].includes(code)||rain>=70)return{cls:'ro-bad',em:'🌧️',lbl:'Probably rained out!',sub:'Heavy rain — grab the brollies!'};
  if(rain>=40)return{cls:'ro-risky',em:'🌦️',lbl:'Might get wet!',sub:'Pack a rain jacket just in case 🧥'};
  if(rain>=15)return{cls:'ro-ok',em:'⛅',lbl:'Should be OK!',sub:'Small chance of shower — fingers crossed!'};
  return{cls:'ro-great',em:'⚾☀️',lbl:'Perfect baseball weather!',sub:'Great day for a game — hot dog time! 🌭'};
}

async function buildRainout(){
  // Use ESPN MLB games if loaded, else hardcoded fallback
  const games=rainoutGames.length?rainoutGames:[
    {home:'WSH',away:'ATL',homeName:'Washington',awayName:'Atlanta',isLive:true,isSched:false},
    {home:'DET',away:'MIL',homeName:'Detroit',   awayName:'Milwaukee',isLive:false,isSched:false},
    {home:'CHC',away:'PHI',homeName:'Cubs',      awayName:'Phillies',isLive:false,isSched:false},
    {home:'COL',away:'SD', homeName:'Colorado',  awayName:'San Diego',isLive:false,isSched:true},
    {home:'SF', away:'LAD',homeName:'Giants',    awayName:'Dodgers',  isLive:false,isSched:true},
    {home:'BOS',away:'NYY',homeName:'Red Sox',   awayName:'Yankees',  isLive:false,isSched:true},
  ];

  const grid=document.getElementById('rgrid');
  grid.innerHTML=games.map((g,i)=>`<div class="ro" id="ro-${i}">
    <div class="ro-lb ${g.isLive?'ro-live-lb':'ro-sched-lb'}">${g.isLive?'🔴 LIVE NOW':g.isSched?'🕐 Today':' Final'}</div>
    <div class="ro-teams">${g.awayName||g.away} @ ${g.homeName||g.home}</div>
    <div class="ro-stad">${ST[g.home]?ST[g.home].n+' · '+ST[g.home].c:'Stadium'}</div>
    <div class="rld"><div class="mspin"></div><span>Checking stadium weather...</span></div>
  </div>`).join('');

  for(let i=0;i<games.length;i++){
    const g=games[i];
    const st=ST[g.home];if(!st)continue;
    try{
      const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${st.lat}&longitude=${st.lon}&current=temperature_2m,weathercode,precipitation_probability&timezone=${encodeURIComponent(st.tz)}`);
      const j=await r.json();const wx=j.current;
      const v=rainV(wx.precipitation_probability??0,wx.weathercode);
      const card=document.getElementById('ro-'+i);if(!card)continue;
      card.className='ro '+v.cls;
      card.innerHTML=`
        <div class="ro-lb ${g.isLive?'ro-live-lb':'ro-sched-lb'}">${g.isLive?'🔴 LIVE NOW':g.isSched?'🕐 Today':' Final'}</div>
        <div class="ro-teams">${g.awayName||g.away} @ ${g.homeName||g.home}</div>
        <div class="ro-stad">${st.n} · ${st.c}</div>
        <div class="ro-v"><div class="ro-em">${v.em}</div><div><div class="ro-lbl">${v.lbl}</div><div class="ro-sub">${v.sub}</div></div></div>
        <div class="ro-stats">
          <div class="ro-stat">🌡️ ${tStr(wx.temperature_2m)}</div>
          <div class="ro-stat">💧 ${wx.precipitation_probability??0}% rain</div>
          <div class="ro-stat">${ICO[wx.weathercode]??'🌡️'} ${TXT[wx.weathercode]??''}</div>
        </div>`;
    }catch(e){}
    await new Promise(r=>setTimeout(r,100));
  }
}

/* ── WEATHER ── */
function buildTabs(){document.getElementById('tabs').innerHTML=CITIES.map(c=>`<button class="tab${c.id===city.id?' on':''}" onclick="pick('${c.id}')">${c.flag} ${c.name}</button>`).join('');}
function pick(id){city=CITIES.find(c=>c.id===id);buildTabs();render();}

async function fetchWx(c){
  if(wxCache[c.id])return wxCache[c.id];
  const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m,windgusts_10m,relativehumidity_2m,precipitation,uv_index&hourly=temperature_2m,weathercode,precipitation_probability,precipitation&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,sunrise,sunset,uv_index_max,windspeed_10m_max&wind_speed_unit=kmh&forecast_days=6&timezone=${encodeURIComponent(c.tz)}`).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json()});
  let aqi=null,aqiIdx=null;
  try{const a=await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${c.lat}&longitude=${c.lon}&current=european_aqi&timezone=${encodeURIComponent(c.tz)}`).then(r=>r.json());aqi=a?.current?.european_aqi??null;if(aqi!=null)aqiIdx=Math.min(4,Math.floor(aqi/25));}catch(e){}
  wxCache[c.id]={w,aqi,aqiIdx};return wxCache[c.id];
}

</div>

/* ── COUNTDOWN ── */
function startCountdown(){
  secondsLeft=600;
  const iv=setInterval(()=>{
    secondsLeft--;
    const m=Math.floor(secondsLeft/60),s=secondsLeft%60;
    const el=document.getElementById('nxt');
    if(el)el.textContent=`Weather auto-refreshes in ${m}:${s.toString().padStart(2,'0')} · Scores: click Refresh Scores anytime`;
    if(secondsLeft<=0){clearInterval(iv);wxCache={};render();buildRainout();startCountdown();}
  },1000);
}

/* ── INIT ── */
buildTabs();
render();
loadScores();
switchTab('mlb');
startCountdown();
</script>
